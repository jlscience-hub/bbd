<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李娟博士科普作品集 / Dr. Juan Li Science Portfolio</title>
    <style>
        :root {
            --bg-primary: #fafaf9;
            --bg-secondary: #f5f5f4;
            --bg-card: #ffffff;
            --text-primary: #1c1917;
            --text-secondary: #57534e;
            --text-muted: #a8a29e;
            --accent: #0c4a6e;
            --accent-light: #e0f2fe;
            --accent-hover: #075985;
            --border: #e7e5e4;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

                /* ===== HEADER: 沉浸式粒子动画 ===== */
        header {
            position: relative;
            background: #0f172a;
            color: #fff;
            height: auto;
            min-height: 320px;
            max-height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 60px 20px;
        }

        .header-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(15,23,42,0.5) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .header-content-center {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        .avatar-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6, #ec4899);
            padding: 3px;
            margin: 0 auto 24px;
            animation: rotate 10s linear infinite;
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.3);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            animation: rotate 10s linear infinite reverse;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            line-height: 1.1;
        }

        .title-gradient {
            background: linear-gradient(135deg, #fff 0%, #38bdf8 50%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-sub {
            display: block;
            font-size: 1.8rem;
            font-weight: 600;
            color: #94a3b8;
            margin-top: 6px;
            letter-spacing: 0.05em;
        }

        .title-underline {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #8b5cf6);
            margin: 0 auto 20px;
            border-radius: 2px;
        }

        header p {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 1.5;
        }

        .header-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .header-tag {
            padding: 6px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }

        .header-tag:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            header {
                min-height: 260px;
                max-height: 360px;
                padding: 40px 16px;
            }
            header h1 {
                font-size: 2.4rem;
            }
            .title-sub {
                font-size: 1.2rem;
            }
            .avatar-ring {
                width: 80px;
                height: 80px;
            }
            .avatar-inner {
                font-size: 2rem;
            }
            .header-tags {
                gap: 6px;
            }
            .header-tag {
                padding: 5px 12px;
                font-size: 0.75rem;
            }
            .title-underline {
                margin-bottom: 16px;
            }
            header p {
                font-size: 0.95rem;
            }
        }

        /* ===== LANGUAGE TOGGLE ===== */
        .lang-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
        }

        .lang-toggle button {
            padding: 10px 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            color: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-toggle button:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }

        .lang-icon {
            font-size: 1.1rem;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            max-width: 1280px;
            margin: 60px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        /* ===== SIDEBAR ===== */
        .author-sidebar {
            background: var(--bg-card);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            position: sticky;
            top: 100px;
            height: fit-content;
            transition: var(--transition);
        }

        .author-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #38bdf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            font-weight: 700;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(12, 74, 110, 0.2);
            position: relative;
            overflow: hidden;
        }

        .author-avatar::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0.6;
        }

        .author-sidebar h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-sidebar p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .more-about-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: var(--accent);
            color: #fff;
            border-radius: 100px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .more-about-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(12, 74, 110, 0.25);
        }

        .sidebar-tags {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .sidebar-tags h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-radius: 100px;
            font-size: 0.8rem;
            margin: 0 6px 8px 0;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .sidebar-tag:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: #bae6fd;
            transform: translateY(-1px);
        }

        .tag-icon {
            font-size: 0.9rem;
        }

        /* ===== MAIN CONTENT ===== */
        main {
            width: 100%;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h2::before {
            content: '';
            display: block;
            width: 4px;
            height: 28px;
            background: var(--accent);
            border-radius: 2px;
        }

        .section-icon {
            font-size: 1.4rem;
            opacity: 0.8;
        }

        /* ===== TAGS CONTAINER ===== */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 32px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .category-tag {
            padding: 8px 18px;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            outline: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .category-tag:hover {
            background: var(--bg-secondary);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        .category-tag.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(12, 74, 110, 0.2);
        }

        .cat-icon {
            font-size: 1rem;
        }

        /* ===== ARTICLES GRID ===== */
        .full-articles-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .article-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            border: 1px solid var(--border);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .article-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #38bdf8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: #cbd5e1;
        }

        .article-card:hover::before {
            opacity: 1;
        }

        .article-card-header {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .article-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: inherit;
        }

        .article-tag:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-1px);
        }

        .article-card h4 {
            margin: 0 0 12px 0;
            font-size: 1.15rem;
            color: var(--text-primary);
            line-height: 1.4;
            font-weight: 600;
            letter-spacing: -0.01em;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .article-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .article-card .abstract {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin: 0 0 20px 0;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .read-more {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition);
        }

        .read-more::after {
            content: '→';
            transition: transform 0.3s;
        }

        .read-more:hover {
            color: var(--accent-hover);
        }

        .read-more:hover::after {
            transform: translateX(4px);
        }

        .meta-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-icon {
            font-size: 0.9rem;
        }

        /* ===== ADDITIONAL WORKS ===== */
        .additional-works {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            border: 1px solid var(--border);
            margin-top: 48px;
        }

        .additional-works h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .additional-works-list {
            list-style: none;
            padding: 0;
            margin: 0;
            columns: 2;
            column-gap: 32px;
        }

        .additional-works-list li {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            break-inside: avoid;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: var(--transition);
            position: relative;
            padding-left: 20px;
        }

        .additional-works-list li::before {
            content: '📄';
            position: absolute;
            left: 0;
            top: 10px;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .additional-works-list li:hover {
            padding-left: 24px;
        }

        .additional-works-list li:hover::before {
            opacity: 1;
        }

        .additional-works-list li:last-child {
            border-bottom: none;
        }

        .work-title {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.5;
        }

        .work-source {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ===== CATEGORY & ABOUT PAGES ===== */
        .category-page, .about-full-page {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            background: var(--accent-light);
        }

        .back-btn:hover {
            background: #bae6fd;
            transform: translateX(-4px);
        }

        .category-page h2, .about-full-page h2 {
            margin-bottom: 24px;
            font-size: 1.75rem;
        }

        .more-articles-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .more-articles-list li {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            transition: var(--transition);
            position: relative;
            padding-left: 28px;
        }

        .more-articles-list li::before {
            content: '🔬';
            position: absolute;
            left: 0;
            top: 16px;
            font-size: 1rem;
            opacity: 0.4;
        }

        .more-articles-list li:hover {
            padding-left: 32px;
            background: var(--bg-secondary);
            margin: 0 -16px;
            padding-right: 16px;
            border-radius: var(--radius-sm);
        }

        .more-articles-list li:hover::before {
            opacity: 0.8;
        }

        .more-articles-list a {
            color: var(--text-primary);
            text-decoration: none;
            flex: 1;
            font-weight: 500;
            transition: color 0.2s;
        }

        .more-articles-list a:hover {
            color: var(--accent);
        }

        .article-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-left: 16px;
            white-space: nowrap;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== ABOUT PAGE ===== */
        .about-header-visual {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .about-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #38bdf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 4px 16px rgba(12, 74, 110, 0.2);
            flex-shrink: 0;
        }

        #full-about-content h3 {
            font-size: 1.2rem;
            color: var(--accent);
            margin-top: 24px;
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #full-about-content p {
            margin-bottom: 16px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .about-icon {
            font-size: 1.1rem;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 48px 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 80px;
            background: var(--bg-secondary);
            position: relative;
        }

        .footer-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 0 auto 20px;
            border-radius: 2px;
            opacity: 0.3;
        }

        .footer-decoration {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            opacity: 0.4;
        }

        /* ===== SCROLL REVEAL ===== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 32px;
                margin-top: 40px;
            }
            .author-sidebar {
                position: static;
                top: auto;
            }
            .full-articles-container {
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            }
            .additional-works-list {
                columns: 1;
            }
        }

        @media (max-width: 768px) {
            header {
                min-height: 500px;
                max-height: 700px;
            }
            header h1 {
                font-size: 2.8rem;
            }
            .title-sub {
                font-size: 1.4rem;
            }
            .avatar-ring {
                width: 90px;
                height: 90px;
            }
            .avatar-inner {
                font-size: 2.2rem;
            }
            .header-tags {
                gap: 8px;
            }
            .header-tag {
                padding: 6px 14px;
                font-size: 0.8rem;
            }
            .main-container {
                padding: 0 16px;
                margin-top: 30px;
            }
            .full-articles-container {
                grid-template-columns: 1fr;
            }
            .article-card .abstract {

        // ===== PARTICLE ANIMATION =====
        (function() {
            const canvas = document.getElementById('headerCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationId;
            
            function resize() {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
            }
            resize();
            window.addEventListener('resize', resize);
            
            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                        this.reset();
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(180, 190, 210, ${this.opacity})`;
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(180, 190, 210, ${0.12 * (1 - dist/150)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    });
                });
                animationId = requestAnimationFrame(animate);
            }
            animate();
            
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    cancelAnimationFrame(animationId);
                } else {
                    animate();
                }
            });
        })();

            }));
            
            const additionalItems = filteredAdditional.map(work => {
                const dateMatch = work.source.match(/(\d{4}-\d{2}-\d{2})/);
                const date = dateMatch ? dateMatch[1] : '';
                return {
                    title: currentLang === 'zh' ? work.zhTitle : work.enTitle,
                    link: '#',
                    date: date
                };
            });
            
            const allItems = [...mainItems, ...additionalItems];
            allItems.sort((a, b) => (b.date && a.date) ? new Date(b.date) - new Date(a.date) : 0);
            
            if (allItems.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
            } else {
                document.getElementById('empty-state').style.display = 'none';
                allItems.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <a href="${item.link}" ${item.link !== '#' ? 'target="_blank"' : ''}>${item.title}</a>
                        ${item.date ? `<span class="article-meta"><span class="meta-icon">📅</span>${item.date}</span>` : ''}
                    `;
                    list.appendChild(li);
                });
            }
            
            window.scrollTo(0, 0);
        }

        function showMedia(mediaName) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('about-full-page').style.display = 'none';
            document.getElementById('category-page').style.display = 'block';
            
            document.getElementById('category-title').innerText = (currentLang === 'zh' ? '媒体平台：' : 'Media: ') + mediaName;
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            
            const filteredMain = articlesData.filter(a => a.media === mediaName);
            const filteredAdditional = additionalWorksData.filter(w => w.media === mediaName);
            
            const mainItems = filteredMain.map(article => ({
                title: currentLang === 'zh' ? article.zhTitle : article.enTitle,
                link: article.link,
                date: article.date || ''
            }));
            
            const additionalItems = filteredAdditional.map(work => {
                const dateMatch = work.source.match(/(\d{4}-\d{2}-\d{2})/);
                const date = dateMatch ? dateMatch[1] : '';
                return {
                    title: currentLang === 'zh' ? work.zhTitle : work.enTitle,
                    link: '#',
                    date: date
                };
            });
            
            const allItems = [...mainItems, ...additionalItems];
            allItems.sort((a, b) => (b.date && a.date) ? new Date(b.date) - new Date(a.date) : 0);
            
            if (allItems.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
            } else {
                document.getElementById('empty-state').style.display = 'none';
                allItems.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <a href="${item.link}" ${item.link !== '#' ? 'target="_blank"' : ''}>${item.title}</a>
                        ${item.date ? `<span class="article-meta"><span class="meta-icon">📅</span>${item.date}</span>` : ''}
                    `;
                    list.appendChild(li);
                });
            }
            
            window.scrollTo(0, 0);
        }

        function showAboutFull() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('category-page').style.display = 'none';
            document.getElementById('about-full-page').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showMainPage() {
            document.getElementById('category-page').style.display = 'none';
            document.getElementById('about-full-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'grid';
            window.scrollTo(0, 0);
            
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach(el => {
                    el.classList.add('active');
                });
            }, 100);
        }

        // 确保DOM完全加载后再渲染
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderPage);
        } else {
            renderPage();
        }
    </script>
</body>
</html>
